apiVersion: apps/v1
kind: Deployment
metadata:
  name: studymate-deployment
  labels:
    app: studymate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: studymate
  template:
    metadata:
      labels:
        app: studymate
    spec:
      containers:
        - name: studymate
          image: amircw/studymate-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: studymate-secrets
                  key: GROQ_API_KEY
          envFrom:
            - configMapRef:
                name: studymate-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"